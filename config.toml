enable-magisk-update = true
parallel-jobs = 1
patches-version = "latest"
cli-version = "latest"

# Use rvmm-config-gen to generate a config.

[YouTube]
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
arch = "arm64-v8a"
build-mode = "apk"
excluded-patches = "'Announcements' 'Custom branding' 'Enable debugging'"
patcher-args = "-e 'Theme' -OdarkThemeBackgroundColor=#000000 -e 'Hide Shorts components' -OhideShortsAppShortcut=true -OhideShortsWidget=true"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"

[Music]
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
arch = "arm64-v8a"
build-mode = "apk"
arch = "arm64-v8a"
excluded-patches = "'Custom branding' 'Custom branding' 'Enable debugging'"
patcher-args = "-e 'Theme' -OdarkThemeBackgroundColor=#000000"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"

# From @rodrigoswz
[Gboard]
enabled = true
app-name = "Gboard"
rv-brand = "jasonwu1994"
riplib = true
arch = "arm64-v8a"
patches-source = "jasonwu1994/Gboard-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://gboard-go.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/gboard"

[Pinterest]
enabled = true
app-name = "Pinterest"
rv-brand = "binarymend"
riplib = true
arch = "arm64-v8a"
patches-source = "binarymend/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://pinterest.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/pinterest
